<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jarl/Adamsson – Entré</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="wrap gate-wrap">
      <main class="gate-card house-card">
        <div class="eyebrow">Privat entré</div>
        <h1>Jarl/Adamsson</h1>
        <p>Välkommen in. Den här entrésidan fungerar som dörren in till huset och dess projekt.</p>
        <form id="loginForm" class="login-form">
          <label for="password">Lösenord</label>
          <input id="password" name="password" type="password" placeholder="Ange lösenord" autocomplete="current-password" />
          <button type="submit">Gå in</button>
          <p id="loginError" class="error-text" hidden>Fel lösenord.</p>
        </form>
      </main>
    </div>
    <script src="./portal.js"></script>
  </body>
</html>
